services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION}
    restart: always
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.n8n.rule=Host(`${N8N_DOMAIN}`)
      - traefik.http.routers.n8n.entrypoints=websecure
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.tls.certresolver=letsencrypt
      - traefik.http.services.n8n.loadbalancer.server.port=5678
    secrets:
      - postgres_non_root_user
      - postgres_non_root_password
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_RUNNERS_ENABLED=true
      - GENERIC_TIMEZONE="${TIMEZONE}"
      - TZ="${TIMEZONE}"
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER_FILE=/run/secrets/postgres_non_root_user
      - DB_POSTGRESDB_PASSWORD_FILE=/run/secrets/postgres_non_root_password
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PUBLIC_API_DISABLED=true
      - N8N_PUBLIC_API_SWAGGERUI_DISABLED=true
      - N8N_TEMPLATES_ENABLED=true
      - N8N_HOST=${N8N_DOMAIN}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - default
      - proxy
    depends_on:
      db:
        condition: service_healthy
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entryPoints.websecure.http.tls=true
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - proxy
  db:
    image: postgres:alpine
    restart: always
    secrets:
      - postgres_password
      - postgres_user
      - postgres_non_root_user
      - postgres_non_root_password
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER_FILE=/run/secrets/postgres_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_NON_ROOT_USER_FILE=/run/secrets/postgres_non_root_user
      - POSTGRES_NON_ROOT_PASSWORD_FILE=/run/secrets/postgres_non_root_password
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
      - ./init-data.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U $$(cat /run/secrets/postgres_user) -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  n8n_data:
  postgres_data:
  traefik_letsencrypt:
networks:
  proxy:
secrets:
  postgres_user:
    file: ./postgres_user.txt
  postgres_password:
    file: ./postgres_password.txt
  postgres_non_root_user:
    file: ./postgres_non_root_user.txt
  postgres_non_root_password:
    file: ./postgres_non_root_password.txt